# RS-Agent default configuration

llm:
  provider: openai          # openai | ollama
  model: gpt-4o-mini
  temperature: 0

embedding:
  model: moka-ai/m3e-base
  device: cpu

solution_space:
  source_file: data/solutions/guidance.txt
  index_dir: data/indices/solution_db
  top_k: 10

agent:
  mode: full                # full | baseline | task_inference_only | solution_retrieval_only
  verbose: false

paths:
  eval_questions: data/eval/questions_planning.jsonl
  eval_questions_rschatgpt: data/eval/question_rschatgpt.jsonl
  default_image: examples/sample.png
